name: Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload APKs to, for example v1.0.2. Leave empty to only keep workflow artifacts."
        required: false
        default: "v1.0.2"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.2.12479018"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init --ci --skip-targets-install

      - name: Patch generated Android project
        run: |
          set -euo pipefail
          perl -0pi -e 's/compileSdk = \d+/compileSdk = 35/g; s/targetSdk = \d+/targetSdk = 35/g' src-tauri/gen/android/app/build.gradle.kts
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("src-tauri/gen/android/app/src/main/AndroidManifest.xml")
          raw = manifest.read_text(encoding="utf-8")
          permissions = '''    <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />'''
          raw = raw.replace('    <uses-permission android:name="android.permission.INTERNET" />', permissions)
          raw = raw.replace('android:theme="@style/Theme.osu_beatmap_seekman"', 'android:theme="@style/Theme.osu_beatmap_seekman"\n        android:requestLegacyExternalStorage="true"')
          manifest.write_text(raw, encoding="utf-8")
          import xml.etree.ElementTree as ET
          ET.parse(manifest)
          PY
          grep -nE "compileSdk|targetSdk|applicationId|namespace" src-tauri/gen/android/app/build.gradle.kts
          grep -nE "permission|requestLegacyExternalStorage" src-tauri/gen/android/app/src/main/AndroidManifest.xml
          sed -n '1,45p' src-tauri/gen/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: npx tauri android build --apk --ci

      - name: Collect APKs for signing
        run: |
          mkdir -p android-signing-input
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f -print -exec cp {} android-signing-input/ \;
          test -n "$(ls -A android-signing-input)"

      - name: Sign APKs
        id: sign_apks
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android-signing-input
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-signed-apk
          path: |
            ${{ steps.sign_apks.outputs.signedReleaseFile }}

      - name: Upload APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: true
          files: |
            ${{ steps.sign_apks.outputs.signedReleaseFile }}

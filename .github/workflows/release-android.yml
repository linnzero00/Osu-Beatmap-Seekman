name: Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload APKs to, for example v2.0.3. Leave empty to only keep workflow artifacts."
        required: false
        default: "v2.0.3"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.2.12479018"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init --ci --skip-targets-install

      - name: Patch generated Android project
        run: |
          set -euo pipefail
          perl -0pi -e 's/compileSdk = \d+/compileSdk = 35/g; s/targetSdk = \d+/targetSdk = 35/g; s/manifestPlaceholders\["usesCleartextTraffic"\] = "false"/manifestPlaceholders["usesCleartextTraffic"] = "true"/g' src-tauri/gen/android/app/build.gradle.kts
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("src-tauri/gen/android/app/src/main/AndroidManifest.xml")
          raw = manifest.read_text(encoding="utf-8")
          required_permissions = [
              '    <uses-permission android:name="android.permission.INTERNET" />',
              '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
              '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />',
              '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />',
              '    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />',
          ]
          missing_permissions = [line for line in required_permissions if line not in raw]
          if missing_permissions:
              raw = raw.replace("    <application", "\n".join(missing_permissions) + "\n\n    <application", 1)
          if "android:requestLegacyExternalStorage" not in raw:
              raw = raw.replace('android:theme="@style/Theme.osu_beatmap_seekman"', 'android:theme="@style/Theme.osu_beatmap_seekman"\n        android:requestLegacyExternalStorage="true"')
          manifest.write_text(raw, encoding="utf-8")
          import xml.etree.ElementTree as ET
          ET.parse(manifest)
          activity = Path("src-tauri/gen/android/app/src/main/java/com/linnzero00/osubeatmapseekman/MainActivity.kt")
          activity.write_text("\n".join([
              "package com.linnzero00.osubeatmapseekman",
              "",
              "import android.Manifest",
              "import android.content.Intent",
              "import android.content.pm.PackageManager",
              "import android.net.Uri",
              "import android.os.Build",
              "import android.os.Bundle",
              "import android.os.Environment",
              "import android.provider.Settings",
              "import androidx.core.app.ActivityCompat",
              "import androidx.core.content.ContextCompat",
              "",
              "class MainActivity : TauriActivity() {",
              "    override fun onCreate(savedInstanceState: Bundle?) {",
              "        super.onCreate(savedInstanceState)",
              "        requestStorageAccess()",
              "    }",
              "",
              "    private fun requestStorageAccess() {",
              "        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {",
              "            if (!Environment.isExternalStorageManager()) {",
              "                val uri = Uri.parse(\"package:$packageName\")",
              "                val intent = Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION, uri)",
              "                startActivity(intent)",
              "            }",
              "        } else {",
              "            val permissions = arrayOf(",
              "                Manifest.permission.READ_EXTERNAL_STORAGE,",
              "                Manifest.permission.WRITE_EXTERNAL_STORAGE,",
              "            )",
              "            val missing = permissions.any {",
              "                ContextCompat.checkSelfPermission(this, it) != PackageManager.PERMISSION_GRANTED",
              "            }",
              "            if (missing) {",
              "                ActivityCompat.requestPermissions(this, permissions, 7)",
              "            }",
              "        }",
              "    }",
              "}",
              "",
          ]), encoding="utf-8")
          PY
          grep -nE "compileSdk|targetSdk|applicationId|namespace" src-tauri/gen/android/app/build.gradle.kts
          grep -nE "permission|requestLegacyExternalStorage" src-tauri/gen/android/app/src/main/AndroidManifest.xml
          sed -n '1,45p' src-tauri/gen/android/app/src/main/AndroidManifest.xml
          sed -n '1,80p' src-tauri/gen/android/app/src/main/java/com/linnzero00/osubeatmapseekman/MainActivity.kt
          ./src-tauri/gen/android/gradlew --version

      - name: Build APK
        timeout-minutes: 30
        run: |
          set -euo pipefail
          npx tauri android build --apk --ci
          find src-tauri/gen/android/app/build/outputs -maxdepth 5 -type f -name "*.apk" -print -exec ls -lh {} \;

      - name: Collect APKs for signing
        run: |
          mkdir -p android-signing-input
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f -print -exec cp {} android-signing-input/ \;
          test -n "$(ls -A android-signing-input)"

      - name: Sign APKs
        id: sign_apks
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android-signing-input
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-signed-apk
          path: |
            ${{ steps.sign_apks.outputs.signedReleaseFile }}

      - name: Upload APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          draft: true
          files: |
            ${{ steps.sign_apks.outputs.signedReleaseFile }}
